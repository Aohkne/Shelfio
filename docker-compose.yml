services:
  db:
    image: postgres:16-alpine
    container_name: shelfio-db
    environment:
      POSTGRES_DB: postgres_db
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: postgres_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_user -d postgres_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shelfio-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/postgres_db
      DB_USER: ${DB_USER:-postgres_user}
      DB_PASS: ${DB_PASS:-postgres_pass}
      JWT_SECRET: ${JWT_SECRET:-my-super-secret-key-my-super-secret-key-my-super-secret-key}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-900}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-604800}
    ports:
      - "8080:8080"

volumes:
  pgdata:
