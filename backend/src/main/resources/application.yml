spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres_db
    username: postgres_user
    password: postgres_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /api-docs
    enabled: true

open:
  api:
    title: API Service Document
    version: v1.0.0
    description: This is a backend service
    server: http://localhost:8080/api/backend-service
    serverDes: Local backend service

jwt:
  secret: my-super-secret-key-my-super-secret-key-my-super-secret-key
  expiration: 900 # 15 minutes in seconds
  refresh-duration: 604800 # 7 days in seconds

server:
  port: 8080
  servlet:
    context-path: /api/backend-service
